<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>LAN Messenger</title>

    <!-- SEO / description -->
    <meta
      name="description"
      content="A simple, FOSS, and UNencrypted messager, which can be easily self hosted"
    />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#1e1e2e" />

    <!-- DNS prefetch / preconnect for performance (optional) -->
    <!-- <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /> -->

    <!-- Stylesheets -->
    <link rel="stylesheet" href="./stylesheet/main.css" />

    <!-- Scripts -->
    <script type="module" src="./script/main.js"></script>

    <!-- Optional: canonical URL -->
    <!-- <link rel="canonical" href="https://example.com/" /> -->
  </head>

  <body>
    <!-- Header / Navigation -->
    <header class="topbar">
      <div class="topbar__left">
        <nav class="topbar__nav" aria-label="Navigation bar">
          <a class="topbar__link" href="#/home">Home</a>
          <a class="topbar__link" href="#/chat">Chat</a>
          <a class="topbar__link" href="#/preferences">Preferences</a>
        </nav>
      </div>

      <div class="topbar__center">
        <output class="topbar__indicator">No activity</output>
      </div>

      <div class="topbar__right">
        <input
          class="topbar__username"
          type="text"
          name="topbar-username-field"
          id="topbar-username-field"
          placeholder="Username"
        />
      </div>
    </header>

    <!-- Main content (router renders here) -->
    <main id="app"></main>

    <!-- Page Templates -->
    <template id="home">
      <section class="home">
        <div class="home__content">
          <div class="home__header">
            <h1 class="home__title">LAN Messenger</h1>
            <output class="home__peer-counter">0 Peers</output>
            <output class="home__notification-counter">0 Notifications</output>
          </div>

          <p class="home__description">
            A basic messenger running fully on your Local Area Network.
            Unencrypted, anonymous, just set your username (or don't!), and you
            can start chatting!
          </p>

          <div class="home__form">
            <input
              class="home__username"
              type="text"
              name="home-username-field"
              id="home-username-field"
              placeholder="Enter your username"
            />
            <button type="button" class="home__button">Start Chatting!</button>
          </div>
        </div>
      </section>
    </template>

    <template id="chat">
      <section class="chat">
        <!-- Placeholder -->
      </section>
    </template>

    <template id="preferences">
      <section class="preferences">
        <!-- Placeholder -->
      </section>
    </template>
  </body>
</html>
